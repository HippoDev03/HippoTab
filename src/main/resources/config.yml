update-interval-ticks: 40

tab:
  header:
    - "<gradient:#63d471:#233329><bold>Hippo Network</bold></gradient>"
    - "&7Welcome, &f%player_name%"
  footer:
    - "&7Online: &f%server_online%"
    - "&7Store: <yellow>store.example.com</yellow>"
  player-list-name: "%vaultunlocked_prefix% &f%player_name%"

sorting:
  enabled: true
  rank-placeholder: "%vaultunlocked_weight%"
  descending: false
  default-rank: 0

textdisplay-nametag:
  enabled: true
  # Update interval in ticks (20 ticks = 1 second)
  update-interval-ticks: 20
  # Hide the vanilla nametag so only text-display nametag is shown.
  hide-vanilla-nametag: true
  # Billboard: FIXED, VERTICAL, HORIZONTAL, CENTER
  billboard: VERTICAL
  # Vertical offset while mounted to the player (Y axis).
  offset-y: 0.9
  # Prefix shows BEFORE the player name
  # Example: "%vaultunlocked_prefix%", "<gold>[VIP] ", "<gradient:#FF0000:#00FF00>%player_rank%</gradient> "
  prefix: "%vaultunlocked_prefix%"
  # Suffix shows AFTER the player name
  suffix: ""
  # Optional: disable in specific conditions
  # Examples: "world=lobby" or "%arena%=['beast','diamond']" or "world=pvp;%game_mode%=['survival']"
  disable-if: ""
  second-line:
    enabled: true
    # Label shown before the value
    format: "<red>❤"
    # The value to display (supports placeholders)
    # Examples: "%player_health%", "%player_level%", "%statistic_player_kills%"
    value: "%player_health%"
    # Optional: disable in specific conditions
    disable-if: ""

scoreboard:
  enabled: false
  # Update interval in ticks (20 ticks = 1 second)
  update-interval-ticks: 20
  # Hide the right-side score number column
  hide-number: false
  title: " Hippo Network "
  lines:
    - ""
    - " Testing FFA scoreboard "
    - ""
    - " danielchen.me "

redis-sync:
  enabled: false
  host: "127.0.0.1"
  port: 6379
  username: ""
  password: ""
  database: 0
  key-prefix: "hippotab:tab-sync"
  # Leave blank to auto-use this server port (server-25565, etc)
  server-id: ""
  # Redis publish + fetch interval in ticks.
  publish-interval-ticks: 40
  # How long each server entry stays alive if it stops publishing.
  entry-ttl-seconds: 30

debug:
  # Logs every outgoing HippoTab team packet seen by PacketEvents.
  # Use this to verify whether the client is still being sent ht_* remove packets.
  client-team-packets: false
